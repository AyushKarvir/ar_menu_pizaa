<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger AR Menu</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 5px;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #28a745;
        }

        /* 3D viewer styling */
        model-viewer {
            width: 100%;
            height: 500px;
            background: transparent;
            touch-action: pan-y; 
        }

        model-viewer:focus, 
        model-viewer:focus-visible {
            outline: none;
        }

        .info {
            margin-top: 15px;
            font-size: 16px;
            color: #333;
        }

        /* AR Button Styling */
        .ar-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <h1>Cheese Burger</h1>
    <div class="price">₹99</div>

    <model-viewer
        src="burger.glb"
        ios-src="burger.usdz" 
        alt="3D Burger Model"
        ar
        ar-modes="scene-viewer quick-look webxr"
        ar-scale="auto" 
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1">

        <button slot="ar-button" class="ar-btn">
            View Burger in AR
        </button>

    </model-viewer>

    <div class="info">
        Tap <b>View Burger in AR</b> and point your camera at a table to place the burger in the real world.
    </div>

</body>
</html>
